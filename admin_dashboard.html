<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeBuddy 本地代理管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333}
.container{max-width:1200px;margin:0 auto;padding:20px}
header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:16px 0;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header .container{display:flex;justify-content:space-between;align-items:center}
header h1{font-size:20px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.badge-ok{background:#4caf50;color:#fff}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:20px;overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.card-header h2{font-size:16px;font-weight:600}
.card-body{padding:20px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px}
th{background:#fafafa;font-weight:600;color:#666}
tr:hover{background:#f8f9ff}
.btn{display:inline-block;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;text-decoration:none}
.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1557b0}
.btn-success{background:#4caf50;color:#fff}.btn-success:hover{background:#388e3c}
.btn-danger{background:#f44336;color:#fff}.btn-danger:hover{background:#d32f2f}
.btn-warning{background:#ff9800;color:#fff}.btn-warning:hover{background:#f57c00}
.btn-sm{padding:3px 10px;font-size:12px}
.btn-outline{background:#fff;border:1px solid #ddd;color:#555}.btn-outline:hover{background:#f5f5f5}
.toggle{position:relative;display:inline-block;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:22px;transition:.3s}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:#4caf50}
input:checked+.slider:before{transform:translateX(18px)}
.model-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.model-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#e3f2fd;color:#1565c0;border-radius:4px;font-size:12px;cursor:pointer;user-select:none;border:2px solid transparent;transition:all .15s}
.model-tag:hover{background:#bbdefb}
.model-tag.selected{background:#c8e6c9;color:#2e7d32;border-color:#66bb6a;font-weight:600}
.model-tag.default-marker{margin-left:2px;font-size:9px;opacity:.7}
.model-tag .check{font-size:14px;line-height:1}
.model-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.model-actions .btn{font-size:11px;padding:3px 8px}
.stat-num{font-weight:600;font-size:14px}
.stat-label{font-size:11px;color:#999}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat-card{background:#f8f9ff;border-radius:6px;padding:10px;text-align:center}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:6px}
.stat-mini{background:#f5f5f5;border-radius:4px;padding:4px 6px;text-align:center;font-size:11px}
.stat-mini .num{font-weight:600;font-size:13px}
.stat-mini .lbl{color:#999;font-size:10px}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:6px;color:#fff;font-size:14px;z-index:9999;animation:slideIn .3s ease}
.toast-success{background:#4caf50}
.toast-error{background:#f44336}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.section-title{font-size:14px;font-weight:600;margin-bottom:8px;color:#555}
.empty{text-align:center;color:#999;padding:40px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:9998;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.2);width:440px;max-width:95vw;overflow:hidden;animation:modalIn .2s ease}
@keyframes modalIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:0 4px;line-height:1}
.modal-close:hover{color:#333}
.modal-body{padding:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;font-family:inherit;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#1a73e8;box-shadow:0 0 0 2px rgba(26,115,232,.15)}
.form-group textarea{resize:vertical;min-height:60px}
.form-group .hint{font-size:11px;color:#999;margin-top:2px}
.form-check{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.form-check input[type=checkbox]{width:16px;height:16px;cursor:pointer}
.form-check label{font-size:13px;cursor:pointer}
.modal-footer{padding:14px 20px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px}
</style>
</head>
<body>
<header>
  <div class="container">
    <div>
      <h1>CodeBuddy 本地代理管理后台</h1>
      <div style="font-size:11px;opacity:.8;margin-top:2px">Agent Loop: Windows本地 | localhost:19090 -> copilot.tencent.com</div>
    </div>
    <span class="badge badge-ok" id="statusBadge">运行中</span>
  </div>
</header>
<div class="container">
  <div class="card">
    <div class="card-header"><h2>概览</h2><button class="btn btn-primary btn-sm" onclick="syncAllToWB()">同步全部到WB</button></div>
    <div class="card-body"><div class="stats-grid" id="overviewStats"></div></div>
  </div>
  <div class="card">
    <div class="card-header"><h2>账号管理</h2><button class="btn btn-primary btn-sm" onclick="showAddAccount()">+ 添加账号</button></div>
    <div class="card-body" id="accountList"></div>
  </div>
</div>
<div id="toastContainer"></div>

<script>
const API='/admin';

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const resp=await fetch(API+path,opts);
  const data=await resp.json();
  if(!resp.ok)throw new Error(data.error||resp.statusText);
  return data;
}

function toast(msg,type){
  const el=document.createElement('div');
  el.className='toast toast-'+(type||'success');
  el.textContent=msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

async function loadAll(){
  try{
    const data=await api('GET','/accounts');
    renderOverview(data);
    renderAccounts(data);
  }catch(e){
    toast('加载失败: '+e.message,'error');
  }
}

function renderOverview(data){
  let totalCalls=0,totalTokens=0,activeCount=0;
  for(const acc of data.accounts){
    if(acc.enabled)activeCount++;
    if(acc.stats){totalCalls+=acc.stats.call_count||0;totalTokens+=acc.stats.total_tokens||0;}
  }
  document.getElementById('overviewStats').innerHTML=
    '<div class="stat-card"><div class="stat-num">'+data.accounts.length+'</div><div class="stat-label">账号总数</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+activeCount+'</div><div class="stat-label">已启用</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+totalCalls+'</div><div class="stat-label">总调用次数</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+(totalTokens/1000).toFixed(1)+'K</div><div class="stat-label">总Token</div></div>';
}

function renderAccounts(data){
  const c=document.getElementById('accountList');
  if(!data.accounts.length){c.innerHTML='<div class="empty">暂无账号，点击右上角添加</div>';return;}
  let h=[];

  for(const acc of data.accounts){
    const s=acc.stats||{};
    const models=acc.models||[];
    const defM=acc.default_model||'';

    // Model checkboxes
    const apiKeySafe=escJs(acc.api_key);
    let modelTags='';
    for(const m of models){
      const isDef=m===defM;
      const extra=isDef?'<span class="default-marker">默认</span>':'';
      modelTags+='<span class="model-tag" id="m_'+apiKeySafe+'_'+escJs(m)+'" onclick="toggleModel(this)" data-model="'+escHtml(m)+'">'+
        '<span class="check">&#10003;</span> '+escHtml(m)+extra+
        '</span>';
    }

    const callCount=s.call_count||0;
    const tokens=s.total_tokens||0;
    const success=s.success_count||0;
    const errors=s.error_count||0;
    const lastUsed=s.last_used||'-';

    let statHtml='<div class="stats-row">'+
      '<div class="stat-mini"><div class="num">'+callCount+'</div><div class="lbl">调用</div></div>'+
      '<div class="stat-mini"><div class="num">'+success+'</div><div class="lbl">成功</div></div>'+
      '<div class="stat-mini"><div class="num">'+errors+'</div><div class="lbl">失败</div></div>'+
      '<div class="stat-mini"><div class="num">'+(tokens/1000).toFixed(1)+'K</div><div class="lbl">Token</div></div>'+
      '<div class="stat-mini"><div class="num" style="font-size:10px">'+lastUsed+'</div><div class="lbl">最近使用</div></div>'+
      '</div>';

    const toggleChecked=acc.enabled?' checked':'';
    const accKey=apiKeySafe;
    h.push(
      '<div class="card" style="margin-bottom:12px;border:1px solid #eee">'+
      '<div class="card-header">'+
        '<div>'+
          '<span style="font-weight:600;font-size:15px">'+escHtml(acc.name)+'</span>'+
          '<span style="margin-left:10px;font-size:11px;color:#999">API: '+escHtml(acc.api_key_masked||acc.api_key)+'</span>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<label class="toggle"><input type="checkbox"'+toggleChecked+' onchange="toggleAccount(\''+accKey+'\',this.checked)"><span class="slider"></span></label>'+
          '<button class="btn btn-warning btn-sm" onclick="editAccount(\''+accKey+'\')">编辑</button>'+
          '<button class="btn btn-danger btn-sm" onclick="deleteAccount(\''+accKey+'\',\''+escJs(acc.name)+'\')">删除</button>'+
        '</div>'+
      '</div>'+
      '<div class="card-body">'+
        '<div class="section-title">选择要同步的模型 <span style="font-weight:400;font-size:11px;color:#999">(点击切换)</span></div>'+
        '<div class="model-tags">'+modelTags+'</div>'+
        '<div class="model-actions">'+
          '<button class="btn btn-outline btn-sm" onclick="selectAllModels(\''+accKey+'\',true)">全选</button>'+
          '<button class="btn btn-outline btn-sm" onclick="selectAllModels(\''+accKey+'\',false)">取消全选</button>'+
          '<button class="btn btn-success btn-sm" onclick="syncSelectedModels(\''+accKey+'\')">&#9889; 同步选中模型到WB</button>'+
        '</div>'+
        '<div class="section-title" style="margin-top:10px">使用统计</div>'+statHtml+
      '</div>'+
      '</div>'
    );
  }
  c.innerHTML=h.join('');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJs(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');}

async function toggleAccount(apiKey,enabled){
  try{await api('PUT','/accounts',{api_key:apiKey,enabled:enabled});toast(enabled?'账号已启用':'账号已禁用');loadAll();}
  catch(e){toast('操作失败: '+e.message,'error');}
}

// ---- 模型选择与同步 ----
function toggleModel(el){
  el.classList.toggle('selected');
}

function selectAllModels(apiKey,select){
  const els=document.querySelectorAll('[id^="m_'+apiKey+'_"]');
  for(const el of els){
    if(select)el.classList.add('selected');
    else el.classList.remove('selected');
  }
}

function getSelectedModels(apiKey){
  const els=document.querySelectorAll('[id^="m_'+apiKey+'_"].selected');
  return Array.from(els).map(el=>el.dataset.model);
}

async function syncSelectedModels(apiKey){
  const selected=getSelectedModels(apiKey);
  if(!selected.length){toast('请至少选择一个模型','error');return;}
  try{
    const resp=await fetch(API+'/workbuddy-config?api_key='+encodeURIComponent(apiKey)+'&models='+encodeURIComponent(selected.join(',')));
    const data=await resp.json();
    if(data.success){
      toast('已同步 '+data.synced_count+' 个模型到 WorkBuddy: '+data.models.join(', '));
    }else{
      toast('同步失败: '+(data.error||'未知错误'),'error');
    }
  }catch(e){toast('同步失败: '+e.message,'error');}
}

async function syncAllToWB(){
  try{
    const resp=await fetch(API+'/workbuddy-config?all=1');
    const data=await resp.json();
    if(data.success){
      toast('已同步全部账号模型到 WorkBuddy! ('+data.model_count+' 个模型)');
    }else{
      toast('同步失败: '+(data.error||'未知错误'),'error');
    }
  }catch(e){toast('同步失败: '+e.message,'error');}
}

async function deleteAccount(apiKey,name){
  if(!confirm('确定要删除账号 "'+name+'" 吗？此操作不可恢复！'))return;
  try{await api('DELETE','/accounts',{api_key:apiKey});toast('账号已删除');loadAll();}
  catch(e){toast('删除失败: '+e.message,'error');}
}

// ---- 模态框 ----
function showModal(title, bodyHtml, onConfirm){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=
    '<div class="modal">'+
      '<div class="modal-header"><h3>'+escHtml(title)+'</h3><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button></div>'+
      '<div class="modal-body">'+bodyHtml+'</div>'+
      '<div class="modal-footer">'+
        '<button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">取消</button>'+
        '<button class="btn btn-primary" id="modalConfirmBtn">确定</button>'+
      '</div>'+
    '</div>';
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
  document.getElementById('modalConfirmBtn').addEventListener('click',function(){
    const result=onConfirm(overlay);
    if(result!==false)overlay.remove();
  });
}

function showAddAccount(){
  showModal('添加账号',
    '<div class="form-group"><label>账号名称</label><input id="addName" placeholder="如: 妮" value=""></div>'+
    '<div class="form-group"><label>API Key <span class="hint">(WorkBuddy 用它识别账号)</span></label><input id="addApiKey" placeholder="如: sk-xxx" value=""></div>'+
    '<div class="form-group"><label>CK Key <span class="hint">(从浏览器 cookies 获取)</span></label><input id="addCkKey" placeholder="如: ck_xxx" value=""></div>',
    async function(overlay){
      const name=overlay.querySelector('#addName').value.trim();
      const apiKey=overlay.querySelector('#addApiKey').value.trim();
      const ckKey=overlay.querySelector('#addCkKey').value.trim();
      if(!name||!apiKey||!ckKey){toast('请填写所有字段','error');return false;}
      try{
        await api('POST','/accounts',{name:name,api_key:apiKey,ck_key:ckKey});
        toast('账号添加成功');
        loadAll();
      }catch(e){toast('添加失败: '+e.message,'error');return false;}
    }
  );
}

function editAccount(apiKey){
  (async()=>{
    try{
      const data=await api('GET','/accounts');
      const acc=data.accounts.find(a=>a.api_key===apiKey);
      if(!acc){toast('账号未找到','error');return;}

      showModal('编辑账号: '+acc.name,
        '<div class="form-group"><label>账号名称</label><input id="editName" value="'+escHtml(acc.name)+'"></div>'+
        '<div class="form-group"><label>CK Key <span class="hint">(留空保持不变)</span></label><input id="editCkKey" placeholder="留空则不变"></div>'+
        '<div class="form-group"><label>模型列表 <span class="hint">(逗号分隔)</span></label><input id="editModels" value="'+escHtml(acc.models.join(', '))+'"></div>'+
        '<div class="form-group"><label>默认模型</label><input id="editDefault" value="'+escHtml(acc.default_model||acc.models[0]||'')+'"></div>'+
        '<div class="form-check"><input type="checkbox" id="editEnabled"'+(acc.enabled?' checked':'')+'><label for="editEnabled">启用此账号</label></div>',
        async function(overlay){
          const newName=overlay.querySelector('#editName').value.trim();
          const newCkKey=overlay.querySelector('#editCkKey').value.trim();
          const newModels=overlay.querySelector('#editModels').value.trim();
          const newDefault=overlay.querySelector('#editDefault').value.trim();
          const newEnabled=overlay.querySelector('#editEnabled').checked;
          if(!newName||!newModels||!newDefault){toast('请填写必填字段','error');return false;}
          const body={
            api_key:apiKey,
            name:newName,
            enabled:newEnabled,
            models:newModels.split(',').map(s=>s.trim()).filter(Boolean),
            default_model:newDefault,
          };
          if(newCkKey)body.ck_key=newCkKey;
          await api('PUT','/accounts',body);
          toast('账号已更新');
          loadAll();
        }
      );
    }catch(e){toast('编辑失败: '+e.message,'error');}
  })();
}

loadAll();
</script>
</body>
</html>
